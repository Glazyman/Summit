        function setupInteractions() {
            const form = document.getElementById('contact-form');
            const successBox = document.getElementById('success-box');
            const submitBtn = document.getElementById('submit-btn');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Disable button and show loading state
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                
                const formData = new FormData(form);
                
                try {
                    const response = await fetch('https://formspree.io/f/mzzvwzvb', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        form.style.display = 'none';
                        successBox.style.display = 'block';
                    } else {
                        const data = await response.json().catch(() => null);
                        const errorMsg = data && data.errors ? data.errors.map(e => e.message).join(', ') : 'There was a problem sending your message. Please try again or email us directly at daniel@summitmergers.com';
                        alert(errorMsg);
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Submit Inquiry';
                    }
                } catch (error) {
                    alert('There was a network problem. Please try again or email us directly at daniel@summitmergers.com');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Inquiry';
                }
            });

            // Smooth Scroll with Header Offset
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId === '#') return;
                    const target = document.querySelector(targetId);
                    if (target) {
                        const offset = 80;
                        const bodyRect = document.body.getBoundingClientRect().top;
                        const elementRect = target.getBoundingClientRect().top;
                        const offsetPosition = elementRect - bodyRect - offset;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                });
            });

            // Intersection Observer for Active Nav
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav-links a');
            const observerOptions = { threshold: 0.4, rootMargin: "-80px 0px 0px 0px" };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        navLinks.forEach(link => {
                            link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
                        });
                    }
                });
            }, observerOptions);

            sections.forEach(section => observer.observe(section));

            // FAQ Toggles
            document.querySelectorAll('.faq-item').forEach(item => {
                const question = item.querySelector('.faq-question');
                question.addEventListener('click', () => {
                    const wasActive = item.classList.contains('active');
                    // Close all FAQs
                    document.querySelectorAll('.faq-item').forEach(faq => {
                        faq.classList.remove('active');
                    });
                    // Open clicked FAQ if it wasn't already active
                    if (!wasActive) {
                        item.classList.add('active');
                    }
                });
            });
        }

        function setupMobileNav() {
            const header = document.querySelector('header');
            const menuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (!menuBtn || !navLinks) return;
            function closeMenu() {
                header.classList.remove('nav-open');
                menuBtn.setAttribute('aria-expanded', 'false');
                menuBtn.setAttribute('aria-label', 'Open menu');
                document.body.style.overflow = '';
            }
            function openMenu() {
                header.classList.add('nav-open');
                menuBtn.setAttribute('aria-expanded', 'true');
                menuBtn.setAttribute('aria-label', 'Close menu');
                document.body.style.overflow = 'hidden';
            }
            menuBtn.addEventListener('click', () => {
                if (header.classList.contains('nav-open')) closeMenu();
                else openMenu();
            });
            navLinks.querySelectorAll('a').forEach(function (a) {
                a.addEventListener('click', closeMenu);
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeMenu();
            });
            window.addEventListener('resize', function () {
                if (window.innerWidth > 768) closeMenu();
            });
        }

        function prefillFromUrl() {
            const hash = window.location.hash; // e.g. #contact?listing=Commercial%20HVAC...
            const match = hash.match(/[?&]listing=([^&]*)/);
            if (match) {
                const listing = decodeURIComponent(match[1]);
                const msgField = document.getElementById('message');
                if (msgField && !msgField.value) {
                    msgField.value = 'I am interested in the following listing: ' + listing;
                }
                // Scroll to the contact section after render
                const target = document.getElementById('contact');
                if (target) {
                    setTimeout(() => {
                        const offset = 80;
                        const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }, 100);
                }
            }
        }

        window.onload = function () {
            init();
            setupMobileNav();
            prefillFromUrl();
        };
